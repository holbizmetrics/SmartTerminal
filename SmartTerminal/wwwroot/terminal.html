<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Smart Terminal</title>

    <!-- CascadiaMono font (bundled when available) -->
    <style>
        @font-face {
            font-family: 'CascadiaMono';
            src: url('vendor/fonts/CascadiaMono.woff2') format('woff2'),
                 url('vendor/fonts/CascadiaMono.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
    </style>

    <!-- xterm.js (bundled) -->
    <link rel="stylesheet" href="vendor/xterm/xterm.min.css" />
    <script src="vendor/xterm/xterm.min.js"></script>
    <script src="vendor/xterm/addon-fit.min.js"></script>
    <script src="vendor/xterm/addon-web-links.min.js"></script>

    <!-- KaTeX for inline LaTeX rendering (bundled) -->
    <link rel="stylesheet" href="vendor/katex/katex.min.css" />
    <script src="vendor/katex/katex.min.js"></script>

    <!-- marked.js for Markdown rendering (bundled) -->
    <script src="vendor/marked/marked.min.js"></script>

    <!-- mermaid.js for diagram rendering via OSC 1338 (bundled) -->
    <script src="vendor/mermaid/mermaid.min.js"></script>

    <style>
        :root {
            --katex-fg: #e0e0e0;
            --katex-bg: rgba(26, 26, 46, 0.95);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }

        #terminal-container {
            width: 100%;
            height: 100%;
        }

        /* Override xterm defaults for mobile readability */
        .xterm {
            padding: 4px;
        }

        /* KaTeX overlay positioning and theming */
        .katex-overlay {
            position: relative;
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
            user-select: none;
            transition: outline 0.2s;
        }

        .katex-overlay .katex {
            color: var(--katex-fg);
            font-size: 1.1em;
        }

        .katex-inline {
            line-height: 1.2;
        }

        .katex-block {
            display: block;
            text-align: left;
            background: var(--katex-bg);
            padding: 4px 8px;
            margin: 2px 0;
            border-left: 2px solid var(--katex-fg);
        }

        .katex-display {
            display: block;
            text-align: center;
            background: var(--katex-bg);
            padding: 8px 12px;
            margin: 4px 0;
        }

        .katex-overlay.copied {
            outline: 2px solid #53b3cb;
        }

        /* Markdown overlay theming */
        .markdown-overlay {
            position: relative;
            display: block;
            padding: 8px 12px;
            border-radius: 4px;
            background: var(--katex-bg);
            color: var(--katex-fg);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 13px;
            line-height: 1.5;
            max-width: 80ch;
            overflow-wrap: break-word;
            cursor: pointer;
            user-select: text;
            border-left: 3px solid #53b3cb;
            transition: outline 0.2s;
        }

        .markdown-overlay.copied {
            outline: 2px solid #53b3cb;
        }

        .markdown-overlay h1, .markdown-overlay h2, .markdown-overlay h3,
        .markdown-overlay h4, .markdown-overlay h5, .markdown-overlay h6 {
            color: #53b3cb;
            margin: 0.4em 0 0.2em;
            line-height: 1.3;
        }
        .markdown-overlay h1 { font-size: 1.4em; }
        .markdown-overlay h2 { font-size: 1.2em; }
        .markdown-overlay h3 { font-size: 1.1em; }

        .markdown-overlay p { margin: 0.3em 0; }

        .markdown-overlay code {
            background: rgba(255,255,255,0.08);
            padding: 1px 4px;
            border-radius: 2px;
            font-family: 'CascadiaMono', 'Fira Code', monospace;
            font-size: 0.92em;
        }

        .markdown-overlay pre {
            background: rgba(0,0,0,0.3);
            padding: 6px 8px;
            border-radius: 3px;
            overflow-x: auto;
            margin: 0.4em 0;
        }

        .markdown-overlay pre code {
            background: none;
            padding: 0;
        }

        .markdown-overlay blockquote {
            border-left: 2px solid #e9c46a;
            padding-left: 8px;
            margin: 0.3em 0;
            color: #b0b0b0;
        }

        .markdown-overlay ul, .markdown-overlay ol {
            padding-left: 1.5em;
            margin: 0.3em 0;
        }

        .markdown-overlay table {
            border-collapse: collapse;
            margin: 0.4em 0;
            font-size: 0.9em;
        }

        .markdown-overlay th, .markdown-overlay td {
            border: 1px solid #4a4a6a;
            padding: 3px 8px;
        }

        .markdown-overlay th {
            background: rgba(255,255,255,0.06);
        }

        .markdown-overlay a {
            color: #70a1ff;
            text-decoration: underline;
        }

        .markdown-overlay strong { color: #ffd93d; }

        .markdown-overlay hr {
            border: none;
            border-top: 1px solid #4a4a6a;
            margin: 0.5em 0;
        }

        .markdown-overlay img {
            max-width: 100%;
            border-radius: 3px;
        }

        /* KaTeX inside Markdown */
        .markdown-overlay .katex { color: var(--katex-fg); }

        /* OSC 1338 media overlays */
        .media-overlay {
            position: relative;
            display: block;
            padding: 8px 12px;
            border-radius: 4px;
            background: var(--katex-bg);
            color: var(--katex-fg);
            max-width: 80ch;
            cursor: pointer;
            user-select: text;
            border-left: 3px solid #c77dba;
            transition: outline 0.2s;
        }
        .media-overlay.copied { outline: 2px solid #c77dba; }
        .media-overlay svg { max-width: 100%; height: auto; display: block; margin: 0 auto; }
        .media-overlay img { max-width: 100%; height: auto; display: block; margin: 0 auto; border-radius: 3px; }
        .media-overlay audio { width: 100%; margin: 0; }
        .mermaid-overlay { /* alias for clarity in DOM inspection */ }
    </style>
</head>
<body>
    <div id="loading-indicator" style="position:fixed;top:0;left:0;right:0;padding:20px;color:#e94560;font-size:18px;font-family:monospace;z-index:99999;">
        SmartTerminal loading...
    </div>
    <div id="terminal-container"></div>

    <script>
        // ============================================================
        // Smart Terminal — xterm.js bridge
        //
        // Communication with C# via:
        //   C# → JS:  webView.EvaluateJavaScriptAsync("termWrite('...')")
        //   JS → C#:  window.location = "smartterm://input?data=..."
        //              (intercepted by WebView navigation handler)
        // ============================================================

        let term = null;
        let fitAddon = null;

        function initTerminal() {
            term = new Terminal({
                cursorBlink: true,
                cursorStyle: 'block',
                fontSize: 14,
                fontFamily: "'CascadiaMono', 'Fira Code', 'Cascadia Code', 'Source Code Pro', monospace",
                theme: {
                    background: '#1a1a2e',
                    foreground: '#e0e0e0',
                    cursor: '#e94560',
                    cursorAccent: '#1a1a2e',
                    selectionBackground: 'rgba(233, 69, 96, 0.3)',
                    black: '#1a1a2e',
                    red: '#e94560',
                    green: '#0f3460',
                    yellow: '#e9c46a',
                    blue: '#16213e',
                    magenta: '#c77dba',
                    cyan: '#53b3cb',
                    white: '#e0e0e0',
                    brightBlack: '#4a4a6a',
                    brightRed: '#ff6b81',
                    brightGreen: '#7bed9f',
                    brightYellow: '#ffd93d',
                    brightBlue: '#70a1ff',
                    brightMagenta: '#dda0dd',
                    brightCyan: '#7ec8e3',
                    brightWhite: '#ffffff'
                },
                allowProposedApi: true,
                scrollback: 10000,
                convertEol: false,
                allowTransparency: false
            });

            // Addons
            fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);

            // Canvas renderer — WebGL removed for Android WebView compatibility

            const webLinksAddon = new WebLinksAddon.WebLinksAddon();
            term.loadAddon(webLinksAddon);

            // Mount
            const container = document.getElementById('terminal-container');
            term.open(container);
            fitAddon.fit();

            // ============================================================
            // Rich Rendering via OSC 1337
            // LaTeX:    ESC ] 1337 ; latex=BASE64 [;mode=inline|block|display] ST
            // Markdown: ESC ] 1337 ; markdown=BASE64 [;latex=1] ST
            // ============================================================

            initRichRendering();

            // Auto-copy: when user selects text, copy to system clipboard
            term.onSelectionChange(function() {
                var sel = term.getSelection();
                if (sel && sel.length > 0) {
                    copyToClipboard(sel);
                }
            });

            // When user types → send to C#
            term.onData(function(data) {
                sendToCSharp('input', data);
            });

            // When user resizes (or keyboard shows/hides)
            term.onResize(function(size) {
                sendToCSharp('resize', size.cols + ',' + size.rows);
            });

            // Handle window resize
            window.addEventListener('resize', function() {
                if (fitAddon) {
                    fitAddon.fit();
                }
            });

            // Bell notification — vibrate on \a
            term.onBell(function() {
                sendToCSharp('bell', '1');
                // Visual bell: brief flash
                var container = document.getElementById('terminal-container');
                if (container) {
                    container.style.opacity = '0.7';
                    setTimeout(function() { container.style.opacity = '1'; }, 100);
                }
            });

            // Notify C# we're ready
            sendToCSharp('ready', term.cols + ',' + term.rows);
        }

        // --- C# → JS API ---

        /**
         * Write shell output to the terminal.
         * Called from C#: webView.EvaluateJavaScriptAsync("termWrite('...')")
         */
        function termWrite(base64Data) {
            if (!term) return;
            try {
                // Decode base64 as UTF-8 (atob alone yields Latin-1, mangling
                // multi-byte chars like em-dash, arrows, emoji, non-Latin scripts).
                const text = decodeURIComponent(escape(atob(base64Data)));
                term.write(text);
            } catch (e) {
                console.error('termWrite error:', e);
            }
        }

        /**
         * Resize the terminal grid.
         */
        function termResize(cols, rows) {
            if (!term) return;
            term.resize(cols, rows);
        }

        /**
         * Fit terminal to container (call after keyboard show/hide).
         */
        function termFit() {
            if (fitAddon) {
                fitAddon.fit();
            }
        }

        /**
         * Jump to the top / bottom of the scrollback (TOP / END keys).
         */
        function termScrollTop() {
            if (term) term.scrollToTop();
        }
        function termScrollBottom() {
            if (term) term.scrollToBottom();
        }

        /**
         * Serialize the whole scrollback buffer to plain text (for the CPY key).
         * xterm.js renders to canvas, so Android's long-press text selection has
         * no DOM text to grab — this is the copy path instead.
         * Called from C#: webView.EvaluateJavascript("termGetBuffer()", callback)
         */
        function termGetBuffer() {
            if (!term) return "";
            const buf = term.buffer.active;
            const lines = [];
            for (let i = 0; i < buf.length; i++) {
                const line = buf.getLine(i);
                lines.push(line ? line.translateToString(true) : "");
            }
            while (lines.length && lines[lines.length - 1] === "") lines.pop();
            return lines.join("\n");
        }

        /**
         * Clear the terminal screen.
         */
        function termClear() {
            if (term) {
                term.clear();
            }
        }

        /**
         * Focus the terminal (triggers soft keyboard on mobile).
         */
        function termFocus() {
            if (term) {
                term.focus();
            }
        }

        // --- Rich rendering engine (KaTeX + Markdown) ---

        const richOverlays = new Map();

        function initRichRendering() {
            // Sync theme colors to CSS custom properties
            updateKatexTheme();

            // Initialize mermaid (used by OSC 1338 type=mermaid)
            if (typeof mermaid !== 'undefined') {
                try {
                    mermaid.initialize({
                        startOnLoad: false,
                        theme: 'dark',
                        themeVariables: {
                            primaryColor: '#c77dba',
                            primaryTextColor: '#e0e0e0',
                            primaryBorderColor: '#53b3cb',
                            lineColor: '#e0e0e0',
                            secondaryColor: '#0f3460',
                            tertiaryColor: '#16213e',
                            background: '#1a1a2e',
                            mainBkg: '#16213e',
                            nodeBorder: '#53b3cb',
                            clusterBkg: '#0f3460',
                            titleColor: '#e9c46a',
                            edgeLabelBackground: '#1a1a2e',
                        },
                        fontFamily: 'CascadiaMono, monospace',
                        securityLevel: 'strict',
                    });
                } catch (e) {
                    console.warn('Mermaid init failed:', e);
                }
            }

            // Register OSC 1338 handler for inline media (mermaid, svg, audio, image)
            term.parser.registerOscHandler(1338, function(data) {
                return handleOsc1338(data);
            });

            // Register OSC 1337 handler for LaTeX and Markdown
            term.parser.registerOscHandler(1337, function(data) {
                var params = {};
                data.split(';').forEach(function(part) {
                    var eq = part.indexOf('=');
                    if (eq !== -1) {
                        params[part.substring(0, eq).trim()] = part.substring(eq + 1);
                    }
                });

                // Size limit: reject payloads > 64KB
                var payload = params.latex || params.markdown;
                if (!payload) return false;
                if (payload.length > 65536) {
                    console.warn('SmartTerminal: Rich payload too large, ignoring');
                    return true;
                }

                try {
                    if (params.markdown) {
                        var mdSource = atob(params.markdown);
                        var enableLatex = params.latex === '1' || params.latex === 'true';
                        renderMarkdownAtCursor(mdSource, enableLatex);
                    } else if (params.latex) {
                        var latexSource = atob(params.latex);
                        var mode = params.mode || 'inline';
                        renderLatexAtCursor(latexSource, mode);
                    }
                } catch (e) {
                    console.error('SmartTerminal OSC parse error:', e);
                }

                return true;
            });

            // Click-to-copy on rich overlays
            document.addEventListener('click', function(e) {
                var overlay = e.target.closest('.katex-overlay, .markdown-overlay, .media-overlay');
                if (!overlay) return;
                var source = overlay.dataset.latexSource || overlay.dataset.markdownSource || overlay.dataset.mediaSource;
                if (source) {
                    copyToClipboard(source).then(function() {
                        overlay.classList.add('copied');
                        setTimeout(function() { overlay.classList.remove('copied'); }, 600);
                    });
                }
            });
        }

        function renderLatexAtCursor(latexSource, mode) {
            var cursorX = term.buffer.active.cursorX;

            // Create marker at current cursor line
            var marker = term.registerMarker(0);
            if (!marker) {
                console.error('KaTeX: Failed to create marker');
                return;
            }

            // Create KaTeX container
            var element = document.createElement('div');
            element.className = 'katex-overlay katex-' + mode;
            element.dataset.latexSource = latexSource;
            element.title = latexSource;

            // Render LaTeX
            try {
                katex.render(latexSource, element, {
                    throwOnError: false,
                    displayMode: (mode === 'display' || mode === 'block'),
                    output: 'html'
                });
            } catch (e) {
                element.textContent = 'LaTeX error: ' + e.message;
                element.style.color = term.options.theme.red || '#e94560';
            }

            // Attach to terminal grid via Decoration API
            var decoration = term.registerDecoration({
                marker: marker,
                x: cursorX,
                width: 1,
                height: (mode === 'inline') ? 1 : 3
            });

            if (!decoration) {
                console.error('KaTeX: Failed to create decoration');
                return;
            }

            decoration.onRender(function(el) {
                if (el.children.length === 0) {
                    el.appendChild(element);
                    el.style.overflow = 'visible';
                    el.style.zIndex = '10';
                    el.style.width = 'auto';
                    el.style.height = 'auto';
                    el.style.pointerEvents = 'auto';
                }
            });

            decoration.onDispose(function() {
                richOverlays.delete(marker.id);
            });

            richOverlays.set(marker.id, {
                element: element,
                marker: marker,
                decoration: decoration,
                source: latexSource,
                type: 'latex',
                mode: mode
            });
        }

        function renderMarkdownAtCursor(mdSource, enableLatex) {
            // Create marker at current cursor line
            var marker = term.registerMarker(0);
            if (!marker) {
                console.error('Markdown: Failed to create marker');
                return;
            }

            // Create Markdown container
            var element = document.createElement('div');
            element.className = 'markdown-overlay';
            element.dataset.markdownSource = mdSource;

            // Render Markdown (with HTML sanitization)
            try {
                var html = marked.parse(mdSource, {
                    breaks: true,
                    gfm: true
                });
                // Sanitize: allowlist-based — only keep known-safe elements and attributes
                var tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                var ALLOWED_TAGS = new Set([
                    'p','h1','h2','h3','h4','h5','h6','ul','ol','li','code','pre',
                    'em','strong','a','blockquote','table','thead','tbody','tr','th','td',
                    'hr','br','img','span','div','dl','dt','dd','sup','sub','del','ins',
                    'caption','col','colgroup','details','summary','mark','small','abbr'
                ]);
                var ALLOWED_ATTRS = new Set(['href','src','class','id','alt','title','colspan','rowspan']);
                function sanitizeNode(parent) {
                    var toRemove = [];
                    for (var i = 0; i < parent.childNodes.length; i++) {
                        var node = parent.childNodes[i];
                        if (node.nodeType === 1) { // Element
                            if (!ALLOWED_TAGS.has(node.tagName.toLowerCase())) {
                                toRemove.push(node);
                            } else {
                                // Strip disallowed attributes
                                Array.from(node.attributes).forEach(function(attr) {
                                    if (!ALLOWED_ATTRS.has(attr.name.toLowerCase())) {
                                        node.removeAttribute(attr.name);
                                    } else if (attr.name === 'href' || attr.name === 'src') {
                                        var val = attr.value.trim().toLowerCase().replace(/[\x00-\x1f]/g, '');
                                        if (!val.startsWith('https://') && !val.startsWith('http://') &&
                                            !val.startsWith('data:image/') && !val.startsWith('#')) {
                                            node.removeAttribute(attr.name);
                                        }
                                    }
                                });
                                sanitizeNode(node);
                            }
                        }
                    }
                    toRemove.forEach(function(n) { n.remove(); });
                }
                sanitizeNode(tempDiv);
                element.innerHTML = tempDiv.innerHTML;

                // Process LaTeX inside Markdown if enabled
                if (enableLatex && typeof katex !== 'undefined') {
                    processLatexInMarkdown(element);
                }
            } catch (e) {
                element.textContent = 'Markdown error: ' + e.message;
                element.style.color = term.options.theme.red || '#e94560';
            }

            // Estimate line height based on content
            var lineEstimate = Math.max(3, Math.ceil(mdSource.split('\n').length * 1.2));

            // Attach to terminal grid via Decoration API
            var decoration = term.registerDecoration({
                marker: marker,
                x: 0,
                width: 1,
                height: lineEstimate
            });

            if (!decoration) {
                console.error('Markdown: Failed to create decoration');
                return;
            }

            decoration.onRender(function(el) {
                if (el.children.length === 0) {
                    el.appendChild(element);
                    el.style.overflow = 'visible';
                    el.style.zIndex = '10';
                    el.style.width = 'auto';
                    el.style.height = 'auto';
                    el.style.pointerEvents = 'auto';
                }
            });

            decoration.onDispose(function() {
                richOverlays.delete(marker.id);
            });

            richOverlays.set(marker.id, {
                element: element,
                marker: marker,
                decoration: decoration,
                source: mdSource,
                type: 'markdown'
            });
        }

        function processLatexInMarkdown(container) {
            // Process display math: $$...$$
            // Process inline math: $...$
            // Walk text nodes and replace LaTeX delimiters with rendered KaTeX
            var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
            var textNodes = [];
            while (walker.nextNode()) {
                if (walker.currentNode.parentNode.tagName !== 'CODE' &&
                    walker.currentNode.parentNode.tagName !== 'PRE') {
                    textNodes.push(walker.currentNode);
                }
            }

            textNodes.forEach(function(node) {
                var text = node.textContent;
                // Match $$...$$ (display) and $...$ (inline), not escaped \$
                var regex = /\$\$([^$]+)\$\$|\$([^$\n]+)\$/g;
                var match;
                var parts = [];
                var lastIndex = 0;

                while ((match = regex.exec(text)) !== null) {
                    if (match.index > lastIndex) {
                        parts.push({ type: 'text', value: text.substring(lastIndex, match.index) });
                    }
                    if (match[1]) {
                        parts.push({ type: 'display', value: match[1] });
                    } else if (match[2]) {
                        parts.push({ type: 'inline', value: match[2] });
                    }
                    lastIndex = regex.lastIndex;
                }

                if (parts.length === 0) return;

                if (lastIndex < text.length) {
                    parts.push({ type: 'text', value: text.substring(lastIndex) });
                }

                var frag = document.createDocumentFragment();
                parts.forEach(function(part) {
                    if (part.type === 'text') {
                        frag.appendChild(document.createTextNode(part.value));
                    } else {
                        var span = document.createElement('span');
                        try {
                            katex.render(part.value, span, {
                                throwOnError: false,
                                displayMode: part.type === 'display',
                                output: 'html'
                            });
                        } catch (e) {
                            span.textContent = '$' + part.value + '$';
                            span.style.color = term.options.theme.red || '#e94560';
                        }
                        frag.appendChild(span);
                    }
                });

                node.parentNode.replaceChild(frag, node);
            });
        }

        // --- OSC 1338: inline media (mermaid, svg, audio, image) ---

        var OSC1338_LIMITS = { mermaid: 65536, svg: 262144, audio: 4194304, image: 2097152 };
        var mermaidCounter = 0;

        function handleOsc1338(data) {
            var params = {};
            data.split(';').forEach(function(part) {
                var eq = part.indexOf('=');
                if (eq !== -1) {
                    params[part.substring(0, eq).trim()] = part.substring(eq + 1);
                }
            });

            var type = params.type;
            var b64 = params.data;
            if (!type || !b64) return false;

            var limit = OSC1338_LIMITS[type];
            if (limit === undefined) {
                console.warn('SmartTerminal OSC 1338: unknown type:', type);
                return true;
            }
            // base64 length is ~4/3 of raw byte length
            if (b64.length > Math.ceil(limit * 4 / 3) + 4) {
                console.warn('SmartTerminal OSC 1338: payload too large for type=' + type);
                return true;
            }

            try {
                switch (type) {
                    case 'mermaid':
                        renderMermaidAtCursor(atob(b64));
                        break;
                    case 'svg':
                        renderSvgAtCursor(atob(b64));
                        break;
                    case 'audio':
                        renderAudioAtCursor(b64, params.mime || 'audio/mpeg');
                        break;
                    case 'image':
                        renderImageAtCursor(b64, params.mime || 'image/png', params.width, params.height);
                        break;
                }
            } catch (e) {
                console.error('SmartTerminal OSC 1338 error:', e);
            }

            return true;
        }

        function sanitizeSvgElement(svgEl) {
            svgEl.querySelectorAll('script').forEach(function(el) { el.remove(); });
            svgEl.querySelectorAll('*').forEach(function(el) {
                Array.from(el.attributes).forEach(function(attr) {
                    var n = attr.name.toLowerCase();
                    var v = attr.value.trim().toLowerCase();
                    if (n.indexOf('on') === 0) el.removeAttribute(attr.name);
                    if ((n === 'href' || n === 'xlink:href') && v.indexOf('javascript:') === 0) {
                        el.removeAttribute(attr.name);
                    }
                });
            });
        }

        function createMediaOverlay(sourceForCopy) {
            var element = document.createElement('div');
            element.className = 'media-overlay';
            if (sourceForCopy) element.dataset.mediaSource = sourceForCopy;
            return element;
        }

        function attachMediaOverlay(element, lineHeightEstimate, mediaType) {
            var marker = term.registerMarker(0);
            if (!marker) { console.error('OSC 1338: marker failed'); return; }
            var decoration = term.registerDecoration({
                marker: marker, x: 0, width: 1,
                height: Math.max(3, lineHeightEstimate || 3)
            });
            if (!decoration) { console.error('OSC 1338: decoration failed'); return; }
            decoration.onRender(function(el) {
                if (el.children.length === 0) {
                    el.appendChild(element);
                    el.style.overflow = 'visible';
                    el.style.zIndex = '10';
                    el.style.width = 'auto';
                    el.style.height = 'auto';
                    el.style.pointerEvents = 'auto';
                }
            });
            decoration.onDispose(function() { richOverlays.delete(marker.id); });
            richOverlays.set(marker.id, {
                element: element, marker: marker, decoration: decoration,
                source: element.dataset.mediaSource, type: mediaType || 'media'
            });
        }

        function renderMermaidAtCursor(src) {
            var element = createMediaOverlay(src);
            element.classList.add('mermaid-overlay');
            if (typeof mermaid === 'undefined') {
                element.textContent = '[mermaid not loaded]';
                element.style.color = term.options.theme.red || '#e94560';
                attachMediaOverlay(element, 1, 'mermaid');
                return;
            }
            mermaidCounter++;
            var id = 'st-mermaid-' + mermaidCounter;
            try {
                mermaid.render(id, src).then(function(result) {
                    var temp = document.createElement('div');
                    temp.innerHTML = result.svg;
                    var svg = temp.querySelector('svg');
                    if (svg) {
                        sanitizeSvgElement(svg);
                        element.appendChild(svg);
                    } else {
                        element.textContent = '[mermaid: no SVG produced]';
                    }
                }).catch(function(e) {
                    element.textContent = 'Mermaid error: ' + (e && e.message ? e.message : e);
                    element.style.color = term.options.theme.red || '#e94560';
                });
            } catch (e) {
                element.textContent = 'Mermaid error: ' + e.message;
                element.style.color = term.options.theme.red || '#e94560';
            }
            attachMediaOverlay(element, Math.max(6, Math.ceil(src.split('\n').length * 1.2)), 'mermaid');
        }

        function renderSvgAtCursor(svgXml) {
            var element = createMediaOverlay(svgXml);
            var temp = document.createElement('div');
            temp.innerHTML = svgXml;
            var svg = temp.querySelector('svg');
            if (svg) {
                sanitizeSvgElement(svg);
                element.appendChild(svg);
            } else {
                element.textContent = '[invalid SVG payload]';
                element.style.color = term.options.theme.red || '#e94560';
            }
            attachMediaOverlay(element, 6, 'svg');
        }

        function renderAudioAtCursor(b64Data, mime) {
            var dataUrl = 'data:' + mime + ';base64,' + b64Data;
            var element = createMediaOverlay(dataUrl);
            var audio = document.createElement('audio');
            audio.controls = true;
            audio.src = dataUrl;
            element.appendChild(audio);
            attachMediaOverlay(element, 2, 'audio');
        }

        function renderImageAtCursor(b64Data, mime, width, height) {
            var dataUrl = 'data:' + mime + ';base64,' + b64Data;
            var element = createMediaOverlay(dataUrl);
            var img = document.createElement('img');
            img.src = dataUrl;
            if (width) img.style.maxWidth = width + 'px';
            if (height) img.style.maxHeight = height + 'px';
            element.appendChild(img);
            attachMediaOverlay(element, 6, 'image');
        }

        function updateKatexTheme() {
            if (!term) return;
            var fg = term.options.theme.foreground || '#e0e0e0';
            var bg = term.options.theme.background || '#1a1a2e';
            document.documentElement.style.setProperty('--katex-fg', fg);
            // Convert hex to rgba with 95% opacity
            var r = parseInt(bg.slice(1, 3), 16);
            var g = parseInt(bg.slice(3, 5), 16);
            var b = parseInt(bg.slice(5, 7), 16);
            document.documentElement.style.setProperty('--katex-bg', 'rgba(' + r + ',' + g + ',' + b + ',0.95)');
        }

        function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                return navigator.clipboard.writeText(text);
            }
            // Fallback for older WebViews
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            return Promise.resolve();
        }

        /**
         * Paste text into terminal with bracketed paste mode support.
         * Called from C# for paste operations.
         */
        function termPaste(base64Data) {
            if (!term) return;
            try {
                var text = decodeURIComponent(escape(atob(base64Data)));
                // Bracket the paste for apps that support it
                term.paste(text);
            } catch (e) {
                console.error('termPaste error:', e);
            }
        }

        // --- JS → C# communication ---

        function sendToCSharp(type, data) {
            // Encode data as base64 to handle special characters
            const encoded = btoa(unescape(encodeURIComponent(data)));
            // console.log bridge — intercepted by WebChromeClient on the C# side.
            // Replaces window.location scheme which was unreliable (dropped messages,
            // page navigation issues causing blank screen).
            console.log('smartterm:' + type + ':' + encoded);
        }

        // --- Error display for diagnostics ---

        function showError(msg) {
            var el = document.getElementById('error-display');
            if (!el) {
                el = document.createElement('pre');
                el.id = 'error-display';
                el.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;' +
                    'color:#e94560;background:#1a1a2e;padding:16px;font-size:13px;' +
                    'font-family:monospace;white-space:pre-wrap;overflow:auto;';
                document.body.appendChild(el);
            }
            el.textContent += msg + '\n';
        }

        // Catch unhandled errors globally
        window.onerror = function(msg, url, line, col, error) {
            showError('JS Error: ' + msg + '\n  at ' + url + ':' + line + ':' + col);
        };

        // --- Init ---
        document.addEventListener('DOMContentLoaded', function() {
            // Verify dependencies loaded
            if (typeof Terminal === 'undefined') {
                showError('FATAL: xterm.js (Terminal) not loaded.\n' +
                    'Check that vendor/xterm/xterm.min.js is in android_asset.');
                return;
            }
            if (typeof FitAddon === 'undefined') {
                showError('FATAL: FitAddon not loaded.\n' +
                    'Check that vendor/xterm/addon-fit.min.js is in android_asset.');
                return;
            }

            try {
                initTerminal();
                // Terminal init succeeded — hide loading indicator
                var li = document.getElementById('loading-indicator');
                if (li) li.style.display = 'none';
            } catch (e) {
                showError('initTerminal failed: ' + e.message + '\n' + (e.stack || ''));
            }
        });
    </script>
</body>
</html>
