name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

env:
  DOTNET_VERSION: '10.0.x'
  ANDROID_API_LEVEL: 26
  NDK_VERSION: '27.0.12077973'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}

      - name: Install Android NDK
        run: |
          yes | sdkmanager "ndk;${{ env.NDK_VERSION }}" --sdk_root=$ANDROID_HOME || true
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Build native libpty.so
        working-directory: SmartTerminal/Native
        run: |
          chmod +x build_native.sh
          ./build_native.sh

      - name: Restore dependencies
        working-directory: SmartTerminal
        run: dotnet restore

      - name: Publish APK
        working-directory: SmartTerminal
        run: |
          dotnet publish -f net10.0-android -c Release \
            -p:AndroidSigningKeyStore="" \
            -p:AndroidKeyStore=false \
            -o ./artifacts

      - name: Find APK
        id: find-apk
        run: |
          APK_PATH=$(find SmartTerminal/artifacts -name "*.apk" | head -1)
          APK_NAME=$(basename "$APK_PATH")
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: SmartTerminal ${{ inputs.version }}
          body: |
            ## SmartTerminal ${{ inputs.version }}

            Android terminal emulator with predictive keyboard support, extra keys toolbar, clipboard integration, and inline rich rendering (LaTeX/Markdown).

            ### Install
            Download the APK below and install on your Android device (API 26+).
          files: ${{ steps.find-apk.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
